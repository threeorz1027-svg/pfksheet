<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
  <title>项目价格查询 - 韩国医美比价系统</title>
  <!-- 引入Font Awesome图标库 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    /* 全局样式 */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background-color: #f8f9fa;
      color: #333;
      line-height: 1.6;
      font-size: 16px;
      max-width: 100%;
      overflow-x: hidden;
    }
    
    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 40px 20px;
    }
    
    /* 页面标题 */
    .page-header {
      text-align: center;
      margin-bottom: 40px;
    }
    
    h1 {
      color: #6B4EFF;
      font-size: 2.5rem;
      font-weight: 700;
      margin-bottom: 10px;
      position: relative;
      display: inline-block;
    }
    
    h1::after {
      content: '';
      position: absolute;
      bottom: -10px;
      left: 50%;
      transform: translateX(-50%);
      width: 80px;
      height: 4px;
      background: linear-gradient(90deg, #6B4EFF, #2D9CDB);
      border-radius: 2px;
    }
    
    .subtitle {
      color: #666;
      font-size: 1.1rem;
      margin-top: 20px;
    }
    
    /* 搜索区域 */
    .search-card {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      padding: 30px;
      margin-bottom: 30px;
      position: relative;
      overflow: hidden;
    }
    
    /* 热门标签 */
    .hot-tags {
      margin-bottom: 20px;
      padding-bottom: 15px;
      border-bottom: 1px solid #f0f2f5;
    }
    
    .hot-tags-title {
      font-size: 14px;
      font-weight: 600;
      color: #333;
      margin-right: 10px;
      vertical-align: middle;
    }
    
    .tags-container {
      display: inline-block;
      vertical-align: middle;
    }
    
    .tag {
      display: inline-block;
      padding: 6px 16px;
      margin: 4px;
      border-radius: 30px;
      background-color: #F3E8FF;
      color: #6B4EFF;
      font-size: 14px;
      cursor: pointer;
      transition: all 0.3s ease;
    }
    
    .tag:hover {
      background-color: #E5D5FF;
      transform: translateY(-2px);
    }
    
    .tag:active {
      transform: translateY(0);
    }
    
    .search-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      right: 0;
      height: 4px;
      background: linear-gradient(90deg, #6B4EFF, #2D9CDB);
    }
    
    .search-form {
      display: flex;
      flex-wrap: wrap;
      gap: 20px;
      align-items: end;
    }
    
    .form-group {
      flex: 1;
      min-width: 240px;
    }
    
    .form-group label {
      display: block;
      margin-bottom: 8px;
      font-weight: 600;
      color: #555;
      font-size: 14px;
    }
    
    .form-group select,
    .form-group input {
      width: 100%;
      padding: 12px 16px;
      border: 2px solid #e1e5e9;
      border-radius: 8px;
      font-size: 14px;
      min-height: 44px;
      transition: all 0.3s ease;
      background: #fafbfc;
    }
    
    .form-group select:focus,
    .form-group input:focus {
      outline: none;
      border-color: #6B4EFF;
      box-shadow: 0 0 0 3px rgba(107, 78, 255, 0.1);
      background: white;
    }
    
    .search-btn {
      background: linear-gradient(90deg, #6B4EFF, #2D9CDB);
      color: white;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 600;
      height: 48px;
      transition: all 0.3s ease;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    
    .search-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 12px rgba(107, 78, 255, 0.3);
    }
    
    .search-btn:active {
      transform: translateY(0);
    }
    
    /* 表格容器 */
    .table-container {
      background: white;
      border-radius: 12px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
      overflow: hidden;
      margin-top: 20px;
    }
    
    /* 表格横向滚动容器（移动端可左右滑动查看） */
    .table-responsive {
      overflow-x: auto;
      -webkit-overflow-scrolling: touch;
    }
    
    /* 结果统计 */
    .result-count {
      padding: 16px 24px;
      background-color: #f7f9fc;
      border-bottom: 1px solid #e1e5e9;
      font-size: 14px;
      color: #666;
      font-weight: 500;
    }
    
    /* 表格样式 */
    table {
      width: 100%;
      border-collapse: collapse;
    }
    
    th {
      background-color: #f7f9fc;
      font-weight: 600;
      color: #333;
      text-align: left;
      padding: 16px 24px;
      border-bottom: 2px solid #e1e5e9;
      white-space: nowrap;
    }
    
    td {
      padding: 16px 24px;
      border-bottom: 1px solid #f0f2f5;
      vertical-align: middle;
    }
    
    /* 斑马纹 */
    tr:nth-child(even) {
      background-color: #fafbfc;
    }
    
    tr:hover {
      background-color: #f0f4f8;
      transition: background-color 0.2s ease;
    }
    
    /* 排序表头 */
    th.sortable {
      cursor: pointer;
      user-select: none;
      position: relative;
    }
    
    th.sortable:hover {
      background-color: #f0f4f8;
    }
    
    th .sort-icon {
      margin-left: 8px;
      color: #999;
      font-size: 12px;
    }
    
    th.sort-asc .sort-icon::after {
      content: ' \f062';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      color: #6B4EFF;
    }
    
    th.sort-desc .sort-icon::after {
      content: ' \f063';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
      color: #6B4EFF;
    }
    
    th:not(.sort-asc):not(.sort-desc) .sort-icon::after {
      content: ' \f0dc';
      font-family: 'Font Awesome 6 Free';
      font-weight: 900;
    }
    
    /* 价格列样式 */
    td:nth-child(6) {
      font-weight: 600;
      color: #6B4EFF;
    }
    
    /* 加载状态 */
    .loading {
      text-align: center;
      padding: 80px 20px;
      color: #666;
    }
    
    .loading-spinner {
      width: 40px;
      height: 40px;
      border: 4px solid #f3f3f3;
      border-top: 4px solid #6B4EFF;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    
    /* 错误状态 */
    .error {
      text-align: center;
      padding: 80px 20px;
      color: #dc3545;
    }
    
    .error-icon {
      font-size: 48px;
      margin-bottom: 20px;
    }
    
    /* 无数据状态 */
    .no-data {
      text-align: center;
      padding: 80px 20px;
      color: #666;
    }
    
    .no-data-icon {
      font-size: 64px;
      margin-bottom: 20px;
      color: #adb5bd;
    }
    
    .no-data h3 {
      margin-bottom: 10px;
      color: #495057;
    }
    
    .no-data p {
      color: #6c757d;
    }
    
    /* 响应式设计 - 手机竖屏 */
    @media (max-width: 768px) {
      body {
        max-width: 100%;
        overflow-x: hidden;
      }
      
      .container {
        padding: 20px 15px;
        max-width: 100%;
      }
      
      h1 {
        font-size: 1.75rem;
      }
      
      .subtitle {
        font-size: 1rem;
      }
      
      .search-card {
        padding: 20px;
      }
      
      /* 大家都在搜：标签区域换行 */
      .hot-tags {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 8px;
        margin-bottom: 16px;
      }
      
      .tags-container {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
      }
      
      .tag {
        margin: 0;
      }
      
      /* 搜索表单单列垂直堆叠，100% 宽，间距 12px */
      .search-form {
        flex-direction: column;
        align-items: stretch;
        gap: 0;
      }
      
      .form-group {
        min-width: 100%;
        margin-bottom: 12px;
      }
      
      .form-group:last-of-type {
        margin-bottom: 12px;
      }
      
      .form-group select,
      .form-group input {
        font-size: 16px; /* 防止 iOS 自动缩放 */
        min-height: 44px;
        padding: 12px 16px;
      }
      
      .search-btn {
        width: 100%;
        justify-content: center;
        min-height: 44px;
        margin-top: 4px;
      }
      
      /* 表格可横向滑动，保留全部列 */
      .table-responsive {
        overflow-x: auto;
        -webkit-overflow-scrolling: touch;
      }
      
      .table-container table {
        min-width: 800px;
      }
      
      .result-count {
        padding: 12px 16px;
        font-size: 14px;
      }
      
      th, td {
        padding: 12px 16px;
        font-size: 14px;
      }
      
      th {
        font-size: 13px;
      }
    }
    
    /* 移动端优化 - 小屏 */
    @media (max-width: 480px) {
      .search-card {
        padding: 15px;
      }
      
      .form-group select,
      .form-group input {
        padding: 10px 14px;
        min-height: 44px;
      }
      
      .search-btn {
        padding: 12px 20px;
        height: 44px;
        min-height: 44px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="page-header">
      <h1>项目价格查询</h1>
      <p class="subtitle">按项目筛选，快速比较不同医院价格</p>
    </div>
    
    <div class="search-card">
      <div class="hot-tags">
        <span class="hot-tags-title">🔥 大家都在搜：</span>
        <div class="tags-container">
          <span class="tag">肉毒素</span>
          <span class="tag">超声刀</span>
          <span class="tag">热玛吉</span>
          <span class="tag">丽珠兰黑</span>
        </div>
      </div>
      <div class="search-form">
        <div class="form-group">
          <label for="categorySelect">大类</label>
          <select id="categorySelect">
            <option value="all">全部大类</option>
          </select>
        </div>
        <div class="form-group">
          <label for="projectSelect">项目</label>
          <select id="projectSelect">
            <option value="all">全部项目</option>
          </select>
        </div>
        <div class="form-group">
          <label for="searchInput">搜索关键词</label>
          <input type="text" id="searchInput" placeholder="搜索规格、品牌、部位、价格...">
        </div>
        <button class="search-btn" id="searchBtn">
          <i class="fas fa-search"></i>
          搜索
        </button>
      </div>
    </div>
    
    <div class="table-container">
      <div id="loading" class="loading">
        <div class="loading-spinner"></div>
        <p>加载中，请稍候...</p>
      </div>
      <div id="error" class="error" style="display: none;">
        <div class="error-icon"><i class="fas fa-exclamation-circle"></i></div>
        <p>加载失败，请稍后重试</p>
      </div>
      <div id="noData" class="no-data" style="display: none;">
        <div class="no-data-icon"><i class="fas fa-search"></i></div>
        <h3>暂无匹配项目</h3>
        <p>请尝试调整搜索条件</p>
      </div>
      <div id="resultContainer" style="display: none;">
        <div class="result-count" id="resultCount"></div>
        <div class="table-responsive">
        <table id="resultTable">
          <thead>
            <tr>
              <th>医院名称</th>
              <th>项目名称</th>
              <th>关键规格</th>
              <th>品牌/产地</th>
              <th>适用部位</th>
              <th class="sortable" data-sort-key="price">
                价格<span class="sort-icon"></span>
              </th>
              <th>地址</th>
              <th>预约方式</th>
            </tr>
          </thead>
          <tbody id="tableBody"></tbody>
        </table>
        </div>
      </div>
    </div>
  </div>
  
  <script>
    let filterOptions = { categories: [], projects: [], projectsByCategory: {} };
    let currentResults = [];
    let currentSortKey = null;
    let currentSortDirection = 'asc';
    
    // 提取价格中的数字并返回最小值
    function extractPriceNumber(priceStr) {
      // 将价格字符串转换为字符串并去除空格
      const priceString = String(priceStr || '');
      
      // 提取所有数字（包括用分隔符分隔的数字和范围中的数字）
      // 匹配所有数字序列，包括千位分隔符
      const numberMatches = priceString.match(/\d{1,3}(,\d{3})*/g) || [];
      
      // 将匹配到的数字转换为整数（去除千位分隔符）
      const numbers = numberMatches.map(match => {
        return parseInt(match.replace(/,/g, ''), 10);
      }).filter(num => !isNaN(num));
      
      // 如果没有提取到数字，返回0
      if (numbers.length === 0) {
        return 0;
      }
      
      // 返回最小值
      return Math.min(...numbers);
    }
    
    // 页面加载时获取筛选选项
    window.onload = async function() {
      try {
        const response = await fetch('/api/project-prices/options');
        
        if (!response.ok) {
          if (response.status === 401) {
            window.location.href = '/redeem.html';
            return;
          }
          throw new Error('获取筛选选项失败');
        }
        
        filterOptions = await response.json();
        
        // 填充大类下拉框
        const categorySelect = document.getElementById('categorySelect');
        filterOptions.categories.forEach(category => {
          const option = document.createElement('option');
          option.value = category;
          option.textContent = category;
          categorySelect.appendChild(option);
        });
        
        // 填充项目下拉框
        const projectSelect = document.getElementById('projectSelect');
        filterOptions.projects.forEach(project => {
          const option = document.createElement('option');
          option.value = project;
          option.textContent = project;
          projectSelect.appendChild(option);
        });
        
        document.getElementById('loading').style.display = 'none';
        
        // 绑定大类变化事件（联动）
        categorySelect.addEventListener('change', updateProjectSelect);
        
        // 绑定搜索按钮
        document.getElementById('searchBtn').addEventListener('click', performSearch);
        
        // 绑定价格表头点击事件
        document.querySelector('th[data-sort-key="price"]').addEventListener('click', handlePriceSort);
        
        // 绑定回车键搜索
        document.getElementById('searchInput').addEventListener('keypress', function(e) {
          if (e.key === 'Enter') {
            performSearch();
          }
        });
        
        // 绑定推荐标签点击事件
        document.querySelectorAll('.tag').forEach(tag => {
          tag.addEventListener('click', function() {
            const tagText = this.textContent.trim();
            
            // 重置大类为全部
            document.getElementById('categorySelect').value = 'all';
            
            // 尝试在项目下拉框中找到匹配项
            const projectSelect = document.getElementById('projectSelect');
            let projectFound = false;
            
            for (let i = 0; i < projectSelect.options.length; i++) {
              if (projectSelect.options[i].text === tagText) {
                projectSelect.value = projectSelect.options[i].value;
                projectFound = true;
                break;
              }
            }
            
            // 如果项目下拉框中没有找到匹配项，将标签文本填入搜索框
            if (!projectFound) {
              document.getElementById('searchInput').value = tagText;
            }
            
            // 执行搜索
            performSearch();
          });
        });
        
      } catch (error) {
        console.error('Error:', error);
        document.getElementById('loading').style.display = 'none';
        document.getElementById('error').textContent = '加载失败，请刷新页面重试';
        document.getElementById('error').style.display = 'block';
      }
    };
    
    // 更新项目下拉框（联动）
    function updateProjectSelect() {
      const categorySelect = document.getElementById('categorySelect');
      const projectSelect = document.getElementById('projectSelect');
      const selectedCategory = categorySelect.value;
      
      // 清空项目下拉框
      projectSelect.innerHTML = '<option value="all">全部项目</option>';
      
      let projectsToShow = [];
      
      if (selectedCategory === 'all') {
        // 显示所有项目
        projectsToShow = filterOptions.projects;
      } else {
        // 只显示该大类下的项目
        projectsToShow = filterOptions.projectsByCategory[selectedCategory] || [];
      }
      
      projectsToShow.forEach(project => {
        const option = document.createElement('option');
        option.value = project;
        option.textContent = project;
        projectSelect.appendChild(option);
      });
    }
    
    // 执行搜索
    async function performSearch() {
      const category = document.getElementById('categorySelect').value;
      const project = document.getElementById('projectSelect').value;
      const search = document.getElementById('searchInput').value.trim();
      
      const loading = document.getElementById('loading');
      const error = document.getElementById('error');
      const noData = document.getElementById('noData');
      const resultContainer = document.getElementById('resultContainer');
      
      loading.style.display = 'block';
      error.style.display = 'none';
      noData.style.display = 'none';
      resultContainer.style.display = 'none';
      
      try {
        // 构建查询参数
        const params = new URLSearchParams();
        if (category !== 'all') params.append('category', category);
        if (project !== 'all') params.append('project', project);
        if (search) params.append('search', search);
        
        const response = await fetch(`/api/project-prices?${params.toString()}`);
        
        if (!response.ok) {
          if (response.status === 401) {
            window.location.href = '/redeem.html';
            return;
          }
          throw new Error('搜索失败');
        }
        
        currentResults = await response.json();
        
        loading.style.display = 'none';
        
        if (currentResults.length === 0) {
          noData.style.display = 'block';
        } else {
          // 重置排序状态
          currentSortKey = null;
          currentSortDirection = 'asc';
          updateSortHeaders();
          
          renderResults(currentResults);
          document.getElementById('resultCount').textContent = `共找到 ${currentResults.length} 条记录`;
          resultContainer.style.display = 'block';
        }
        
      } catch (err) {
        console.error('Error:', err);
        loading.style.display = 'none';
        error.textContent = '搜索失败，请稍后重试';
        error.style.display = 'block';
      }
    }
    
    // 渲染结果
    function renderResults(results) {
      const tableBody = document.getElementById('tableBody');
      tableBody.innerHTML = '';
      
      results.forEach(item => {
        const row = document.createElement('tr');
        row.innerHTML = `
          <td>${item.hospital_name || '-'}</td>
          <td>${item.project_name || '-'}</td>
          <td>${item.spec || '-'}</td>
          <td>${item.brand || '-'}</td>
          <td>${item.area || '-'}</td>
          <td>${item.price || '-'}</td>
          <td>${item.address || '-'}</td>
          <td>${item.appointment_method || '-'}</td>
        `;
        tableBody.appendChild(row);
      });
    }
    
    // 处理价格排序
    function handlePriceSort() {
      const sortKey = 'price';
      
      if (currentSortKey === sortKey) {
        currentSortDirection = currentSortDirection === 'asc' ? 'desc' : 'asc';
      } else {
        currentSortKey = sortKey;
        currentSortDirection = 'asc';
      }
      
      updateSortHeaders();
      
      // 排序结果
      const sortedResults = [...currentResults].sort((a, b) => {
        const priceA = extractPriceNumber(a.price);
        const priceB = extractPriceNumber(b.price);
        
        if (priceA < priceB) {
          return currentSortDirection === 'asc' ? -1 : 1;
        } else if (priceA > priceB) {
          return currentSortDirection === 'asc' ? 1 : -1;
        } else {
          return 0;
        }
      });
      
      renderResults(sortedResults);
    }
    
    // 更新排序表头状态
    function updateSortHeaders() {
      const priceHeader = document.querySelector('th[data-sort-key="price"]');
      priceHeader.classList.remove('sort-asc', 'sort-desc');
      
      if (currentSortKey === 'price') {
        priceHeader.classList.add(currentSortDirection === 'asc' ? 'sort-asc' : 'sort-desc');
      }
    }
  </script>
</body>
</html>
